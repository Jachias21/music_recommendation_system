services:
  mongodb:
    image: mongo:latest
    container_name: spotify
    restart: always
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: adminmsj
      MONGO_INITDB_ROOT_PASSWORD: aA123456789!
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
