<nav class="navbar glass">
  <a routerLink="/dashboard" class="logo">
    <span class="logo-icon" [innerHTML]="icons.MUSIC_NOTE"></span>
    <span class="logo-text gradient-text">SoundWave</span>
  </a>

  <div class="nav-links">
    <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">
      <span class="nav-icon" [innerHTML]="icons.HOME"></span>
      <span>Inicio</span>
    </a>
    <a routerLink="/discover" routerLinkActive="active" class="nav-link">
      <span class="nav-icon" [innerHTML]="icons.SEARCH"></span>
      <span>Descubrir</span>
    </a>
    <a routerLink="/playlist" routerLinkActive="active" class="nav-link">
      <span class="nav-icon" [innerHTML]="icons.MUSIC_NOTES"></span>
      <span>Mi Playlist</span>
    </a>
  </div>

  <div class="nav-user">
    @if (auth.user$ | async; as user) {
      <div class="user-profile">
        @if (user.images && user.images.length > 0) {
          <img [src]="user.images[0].url" [alt]="user.display_name" class="user-avatar" />
        } @else {
          <span class="user-avatar user-avatar--placeholder">{{ user.display_name?.charAt(0) || '?' }}</span>
        }
        <span class="user-name">{{ user.display_name }}</span>
      </div>
    }
    <button class="btn-logout" (click)="logout()" title="Cerrar sesión" id="logout-btn">
      <span [innerHTML]="icons.LOGOUT"></span>
    </button>
  </div>
</nav>
