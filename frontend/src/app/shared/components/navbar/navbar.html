<nav class="navbar">
  <div class="navbar-left">
    <span class="breadcrumb" routerLinkActive></span>
  </div>

  <div class="navbar-right">
    @if (auth.user$ | async; as user) {
      <div class="user-profile">
        @if (user.images && user.images.length > 0) {
          <img [src]="user.images[0].url" [alt]="user.display_name" class="user-avatar" />
        } @else {
          <span class="user-avatar user-avatar--placeholder">{{ user.display_name.charAt(0) || '?' }}</span>
        }
        <span class="user-name">{{ user.display_name }}</span>
      </div>
    }
    <button class="btn-logout" (click)="logout()" title="Cerrar sesión">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</nav>
