<div class="login-page">
  <!-- Animated background -->
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>
  <div class="bg-glow bg-glow--3"></div>

  <div class="login-card glass">
    <!-- Brand -->
    <div class="login-brand">
      <span class="login-logo" [innerHTML]="icons.MUSIC_NOTE"></span>
      <h1 class="gradient-text">SoundWave</h1>
      <p class="login-subtitle">Tu sistema de recomendación musical inteligente</p>
    </div>

    <div class="login-divider"></div>

    <!-- Social logins -->
    <div class="social-buttons">
      <button class="btn-social btn-spotify" (click)="loginWithSpotify()" id="spotify-login-btn">
        <svg class="social-icon" viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
        Continuar con Spotify
      </button>

      <button class="btn-social btn-google" (click)="loginWithGoogle()" id="google-login-btn">
        <svg class="social-icon" viewBox="0 0 24 24" width="20" height="20">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuar con Google
      </button>
    </div>

    <!-- Separator -->
    <div class="separator">
      <span class="separator-line"></span>
      <span class="separator-text">o inicia sesión con tu correo</span>
      <span class="separator-line"></span>
    </div>

    <!-- Email/Password form -->
    <form class="login-form" (ngSubmit)="loginLocal()">
      @if (errorMessage) {
        <div class="form-error">
          <span class="form-error-icon" [innerHTML]="icons.WARNING"></span> {{ errorMessage }}
        </div>
      }

      <div class="form-group">
        <input
          type="email"
          class="input"
          placeholder="Correo electrónico"
          [(ngModel)]="email"
          name="email"
          id="login-email"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <input
          type="password"
          class="input"
          placeholder="Contraseña"
          [(ngModel)]="password"
          name="password"
          id="login-password"
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn btn-primary login-submit" [disabled]="isLoading" id="login-submit-btn">
        @if (isLoading) {
          <span class="btn-spinner"></span>
        }
        Iniciar sesión
      </button>
    </form>

    <p class="login-footer">
      ¿No tienes cuenta? <a routerLink="/register" class="link-accent">Regístrate aquí</a>
    </p>
  </div>
</div>
